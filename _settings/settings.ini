[Paths]
; Папка с конфигурацией экспорта IFC
; (обычно копия "IFC_Export_Config_example" из "_examples")
; Примеры:
;   \\SERVER\BIM\IFC_Configs
;   D:\BIM\IFC_Configs
dir_export_config = <путь до папки с конфигами IFC>

; Папка с файлами управления выгрузкой (admin_data на сервере или локально)
; Примеры:
;   \\Server\BIM\ExportIFC\admin_data
;   D:\BIM\admin_data
dir_admin_data = <путь до папки admin_data>

[Settings]
; Режим работы orchestrator:
; True  — рабочий режим: папка admin_data берётся по пути из dir_admin_data
; False — тестовый/локальный режим: локальная admin_data вычисляется
;         относительно расположения settings.ini; если ini лежит в штатной
;         папке _settings, локальная admin_data берётся рядом с корнем
;         текущей раскладки
is_prod_mode = True

; Выполнять ли запуск Revit после подготовки пакетов:
; True  — real-run: формировать Task-файлы, tmp.json и запускать Revit
; False — dry-run: формировать Task-файлы, tmp_*.json и обновлять history.xlsx,
; но Revit не запускать; tmp_*.json остаётся на диске для проверки
run_revit = True

; Включать ли дополнительный no-map-маршрут IFC-экспорта:
; True  — выполнять основной и дополнительный no-map-маршрут
; False — выполнять только основной маршрут
enable_unmapped_export = True

; Таймаут ожидания batch-запуска Revit в минутах:
; 0  — ждать без ограничения
; >0 — по истечении времени считать пакет зависшим и остановить процесс
revit_batch_timeout_minutes = 0

[Revit]
; Список доступных версий запуска Revit (через запятую)
; Должен совпадать с реально установленными версиями на машине выгрузки
; Можно указывать с пропусками: модель пойдёт в первую доступную версию,
; которая не ниже версии самой модели
revit_versions = 2022,2023,2024,2025,2026

; Имя 3D-вида, который используется для экспорта IFC
; Название должно совпадать во всех моделях
export_view3d_name = Navisworks

[Files]
; Базовое имя JSON-файлов настроек экспорта IFC.
; Итоговые файлы имеют вид <имя>.json, например: Export_Settings.json
config_json = Export_Settings

[Mapping]
; Имя папки с общими настройками экспорта IFC внутри dir_export_config
; (где лежит Export_Settings_NotAttributes.json и др.)
dir_common = 00_Common

; Имя папки с файлами маппинга категорий Revit → классов IFC внутри dir_export_config
; (Layer_Mapping.txt и другие варианты маппинга)
dir_layers = 01_Export_Layers

[Excel]
; Имя обязательного листа в manage.xlsx с путями и настройками по проектам
; Если лист отсутствует, запуск завершается ошибкой конфигурации
sheet_path = Path

; Имя листа в manage.xlsx с игнорируемыми путями
sheet_ignore = IgnoreList

; Имя листа в history.xlsx с рабочей историей состояний RVT-моделей
sheet_history = History

; Если комментарии в этом файле мешают, можно удалить все строки, начинающиеся на ";"
